<!DOCTYPE html>

<html>
<head>
    <title>Brain Tumor Detection</title>


<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #1e3c72, #2a5298);
        color: white;
        text-align: center;
        margin: 0;
        padding: 0;
    }

    .container {
        background: rgba(0,0,0,0.65);
        padding: 30px;
        margin: 40px auto;
        width: 60%;
        border-radius: 15px;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    h1 {
        margin-bottom: 20px;
    }

    input[type="file"] {
        margin: 10px;
    }

    button {
        padding: 10px 25px;
        border: none;
        background: #00c6ff;
        color: white;
        font-size: 16px;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #0072ff;
        transform: scale(1.05);
    }

    .result {
        margin-top: 20px;
        font-size: 22px;
        font-weight: bold;
    }

    .confidence {
        font-size: 18px;
        margin: 15px 0;
    }

    .progress-container {
        width: 80%;
        margin: 15px auto;
        background: #ddd;
        border-radius: 10px;
        overflow: hidden;
    }

    .progress-bar {
        background: linear-gradient(to right, #00c6ff, #0072ff);
        padding: 10px;
        color: white;
        text-align: center;
        font-weight: bold;
    }

    img {
        margin-top: 15px;
        border-radius: 12px;
        box-shadow: 0 0 15px rgba(0,0,0,0.7);
        width: 350px;      
        height: auto;
    }
    .images {
        display: flex;
        justify-content: center;
        gap: 60px;          
        flex-wrap: wrap;
        margin-top: 30px;
    }

    .card {
        margin: 10px;
        text-align: center;
    }

    .insight-box {
        margin-top: 25px;
        padding: 15px;
        background: rgba(255,255,255,0.1);
        border-radius: 10px;
    }

</style>


</head>

<body>

<div class="container">


<h1>🧠 Brain Tumor Detection</h1>

<form method="POST" enctype="multipart/form-data">
    <input type="file" name="file" required>
    <br>
    <button type="submit">Predict</button>
</form>

{% if prediction %}

    <div class="result" style="color: {{ color }}">
        {{ prediction }}
    </div>

    <div class="confidence">
        Confidence: {{ confidence }}%
    </div>

    <div style="margin-top:10px; font-size:18px;">
    Severity Level: <b>{{ severity }}</b>
    </div>
    
    <div class="progress-container">
        <div class="progress-bar" style="width: {{ confidence }}%;">
            {{ confidence }}%
        </div>
    </div>

    <div class="insight-box">
        <h3>🩺 Medical Insight</h3>
        <p>{{ advice }}</p>
    </div>

    <div class="images">

        <div class="card">
            <h3>Uploaded Image</h3>
            <img src="{{ image_path }}" width="250">
        </div>

        <div class="card">
            <h3>Grad-CAM</h3>
            <img src="{{ heatmap_path }}" width="250">
        </div>

    </div>

{% endif %}

</div>

</body>
</html>
